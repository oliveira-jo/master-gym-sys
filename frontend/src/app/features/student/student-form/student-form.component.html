<div class="modal d-block bg-dark bg-opacity-50">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          {{ student ? 'Editar Aluno' : 'Novo Aluno' }}
        </h5>

        <button class="btn-close" (click)="cancel()"></button>
      </div>

      <div class="modal-body">

        <form [formGroup]="form">

          <input class="form-control mb-2" placeholder="Nome" formControlName="name">

          <input class="form-control mb-2" placeholder="Email" formControlName="email">

          <input class="form-control mb-2" placeholder="Telefone" formControlName="phone">

          <input class="form-control mb-2" placeholder="CPF" formControlName="cpf">

          <input class="form-control mb-2" placeholder="Data Nascimento" formControlName="birthdate">

          <input class="form-control mb-2" placeholder="Cidade" formControlName="city">

        </form>

      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary" (click)="cancel()">
          Cancelar
        </button>

        <button class="btn btn-primary" (click)="save()">
          Salvar
        </button>

      </div>

    </div>

  </div>

</div>
