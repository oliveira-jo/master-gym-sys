<div class="container">

  <div class="d-flex justify-content-between mb-3">

    <h3>Alunos</h3>

    <button class="btn btn-primary" (click)="openCreate()">
      Novo
    </button>

  </div>

  <table class="table table-striped">

    <thead>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Telefone</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>

      @for (student of students; track student.id) {
      <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.phone }}</td>

        <td>
          <button class="btn btn-sm btn-warning me-2" (click)="openEdit(student)">
            Editar
          </button>

          <button class="btn btn-sm btn-danger" (click)="delete(student.id)">
            Excluir
          </button>
        </td>
      </tr>
      }

    </tbody>

  </table>

  @if (modalOpen) {
  <app-student-form [student]="selectedStudent" (close)="closeModal($event)">
  </app-student-form>
  }

</div>
