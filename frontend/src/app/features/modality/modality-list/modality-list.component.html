<div class="container">

  <!-- w-75 mx-auto ajust to smal table w-75 → 75% and center -->
  <div class="d-flex justify-content-between mb-3 w-75 mx-auto">
    <h3>Modalidades</h3>
    <button class="btn btn-primary" (click)="openCreate()">
      Novo
    </button>
  </div>

  <div class="card shadow-sm border-0 mb-4 w-75 mx-auto">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Modalidade Id</th>
          <th>Modalidade Nome</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody>
        @for (obj of modalities; track obj.id) {
        <tr>
          <td>{{ obj.id }}</td>
          <td>{{ obj.name }}</td>
          <td>
            <button class="btn btn-sm btn-warning me-2" (click)="openEdit(obj)">
              Editar
            </button>
            <button class="btn btn-sm btn-danger" (click)="delete(obj.id)">
              Excluir
            </button>
          </td>
        </tr>
        }
      </tbody>
    </table>

    <!-- Pagination -->
    <nav class="d-flex justify-content-center mt-3">
      <small>
        Exibindo {{ modalities.length }} de {{ totalElements }} registros
      </small>
    </nav>
    <nav class="d-flex justify-content-center mt-3">
      <ul class="pagination">
        <li class="page-item" [class.disabled]="pageResponse?.first">
          <button class="page-link" (click)="previousPage()"> &laquo; </button>
        </li>

        @for (p of pages; track p) {

        <li class="page-item" [class.active]="p === page.page">
          <button class="page-link" (click)="goToPage(p)"> {{ p + 1 }} </button>
        </li>

        }

        <li class="page-item" [class.disabled]="pageResponse?.last">
          <button class="page-link" (click)="nextPage()"> &raquo; </button>
        </li>
      </ul>
    </nav>

    @if (modalOpen) {
    <app-modality-form [modality]="selectedModality" (close)="closeModal($event)">
    </app-modality-form>
    }

  </div>
